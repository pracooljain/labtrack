<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4>Notifications</h4>
    <button class="btn btn-outline-dark btn-sm" ng-click="markAllRead()">
      Mark all as read
    </button>
  </div>

  <div class="text-center mt-5" ng-if="loading">
    <div class="spinner-border" role="status"></div>
  </div>

  <div ng-if="!loading">
    <div class="text-center text-muted mt-5" ng-if="notifications.length === 0">
      <h5>No notifications yet</h5>
    </div>

    <div class="card mb-2 notification-card"
         ng-class="{'unread': !n.isRead}"
         ng-repeat="n in notifications">
      <div class="card-body py-3">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <span class="unread-dot" ng-if="!n.isRead"></span>
            <span ng-class="{'text-muted': n.isRead}">{{ n.message }}</span>
            <br>
            <small class="text-muted">{{ n.createdAt | date:'medium' }}</small>
          </div>
          <button class="btn btn-sm btn-outline-secondary"
                  ng-if="!n.isRead"
                  ng-click="markRead(n)">
            Mark read
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
